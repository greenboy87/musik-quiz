<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greenboys Music Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-container { transition: transform 0.6s ease; }
        .blur-sensitive { filter: blur(8px); transition: filter 0.3s; }
        .blur-sensitive.revealed { filter: blur(0); }
        .hidden-element { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

    <!-- Main Container -->
    <div id="app" class="p-4 max-w-6xl mx-auto">
        
        <!-- Lobby View -->
        <div id="view-lobby" class="space-y-6">
            <h1 class="text-4xl font-bold text-center text-green-500">greenboys Lobby</h1>
            
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Lehrer Sektion -->
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <h2 class="text-xl mb-4">Lehrer-Konsole</h2>
                    <select id="class-select" class="w-full p-2 bg-gray-700 rounded mb-4">
                        <option value="">Klasse wählen...</option>
                    </select>
                    <button onclick="startGame()" class="w-full bg-green-600 py-3 rounded font-bold hover:bg-green-500">Spiel starten</button>
                </div>

                <!-- Schüler Sektion -->
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <h2 class="text-xl mb-4">Schüler-Login</h2>
                    <input type="text" id="student-name" placeholder="Name" class="w-full p-2 bg-gray-700 mb-2 rounded">
                    <div id="emoji-grid" class="grid grid-cols-6 gap-2 mb-4"></div>
                    <button onclick="joinGame()" class="w-full bg-blue-600 py-3 rounded font-bold hover:bg-blue-500">Beitreten</button>
                </div>
            </div>

            <!-- Team Liste -->
            <div id="team-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8"></div>
        </div>
    </div>

    <script>
        // --- Robuster Storage Wrapper ---
        const Storage = {
            set: (key, val) => {
                try { localStorage.setItem(key, JSON.stringify(val)); } 
                catch(e) { console.error("Storage blocked or full", e); }
            },
            get: (key) => {
                try { return JSON.parse(localStorage.getItem(key)); }
                catch(e) { return null; }
            }
        };

        // --- App State ---
        let state = {
            teams: [],
            isTeacher: false,
            privacyMode: true,
            currentRound: 1
        };

        // Emojis für die Auswahl
        const emojis = ["🎸", "🥁", "🎹", "🎤", "🎷", "🎺", "🎻", "🎧", "🎼", "🎵", "🎶", "🎼", "🎹", "🥁", "🎸", "🎤", "🎷", "🎺", "🎻", "🎧", "🎵", "🎶", "🎸", "🥁", "🎹", "🎤", "🎷", "🎺", "🎻", "🎧"];
        
        function initLobby() {
            const grid = document.getElementById('emoji-grid');
            emojis.forEach(e => {
                grid.innerHTML += `<button class="p-2 bg-gray-700 rounded hover:bg-gray-600" onclick="selectEmoji('${e}')">${e}</button>`;
            });
        }

        let selectedEmoji = "🎸";
        function selectEmoji(e) { selectedEmoji = e; }

        function joinGame() {
            const name = document.getElementById('student-name').value;
            if(!name) return;
            const team = { name, emoji: selectedEmoji, score: 0, songs: [] };
            state.teams.push(team);
            Storage.set('teams', state.teams);
            renderTeams();
        }

        function renderTeams() {
            const container = document.getElementById('team-list');
            container.innerHTML = state.teams.map(t => `
                <div class="bg-gray-800 p-4 rounded text-center border border-green-500/30">
                    <div class="text-3xl">${t.emoji}</div>
                    <div class="font-bold">${t.name}</div>
                    <div class="text-2xl text-green-400">${t.score}</div>
                </div>
            `).join('');
        }

        // Init
        initLobby();
        renderTeams();
    </script>
<!-- Spiel-Ansicht (Wird dynamisch eingeblendet) -->
    <div id="view-game" class="hidden space-y-6">
        <div class="flex justify-between items-center bg-gray-800 p-4 rounded-lg">
            <div id="timer" class="text-4xl font-mono text-red-500">60</div>
            <button onclick="togglePrivacy()" id="privacy-btn" class="bg-yellow-600 px-4 py-2 rounded">
                Sichtschutz: AN
            </button>
        </div>

        <div id="scoreboard" class="grid gap-4">
            <!-- Teams werden hier per FLIP-Logik gerendert -->
        </div>

        <!-- KI Importer & Spickzettel Modal -->
        <div class="mt-10 p-6 bg-gray-800 rounded-xl">
            <h3 class="text-xl mb-4">KI Song-Importer (PDF/Bild)</h3>
            <div id="dropzone" class="border-2 border-dashed border-gray-600 p-8 text-center cursor-pointer">
                Dateien hierher ziehen
            </div>
            <input type="password" id="gemini-key" placeholder="Gemini API Key" class="mt-4 w-full p-2 bg-gray-900 rounded">
        </div>
    </div>

    <script>
        // --- Spiel-Logik & Synchronisierung ---
        
        function startGame() {
            document.getElementById('view-lobby').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            updateRound();
        }

        async function updateRound() {
            state.privacyMode = true; // Automatischer Sichtschutz
            renderPrivacy();
            // ntfy.sh Sync-Signal senden
            await fetch('https://ntfy.sh/greenboys_scoreboard', {
                method: 'POST',
                body: JSON.stringify({ action: 'new_round', round: state.currentRound })
            });
        }

        function togglePrivacy() {
            state.privacyMode = !state.privacyMode;
            renderPrivacy();
        }

        function renderPrivacy() {
            const btn = document.getElementById('privacy-btn');
            btn.innerText = state.privacyMode ? "Sichtschutz: AN" : "Sichtschutz: AUS";
            const elements = document.querySelectorAll('.song-data');
            elements.forEach(el => {
                if(state.privacyMode) el.classList.add('blur-sensitive');
                else el.classList.remove('blur-sensitive');
            });
        }

        // --- FLIP Animation Logik ---
        function updateScoreboard() {
            const board = document.getElementById('scoreboard');
            const sortedTeams = [...state.teams].sort((a, b) => b.score - a.score);
            
            // Hier würde in einer komplexeren App die FLIP-Calculation (First-Last-Invert-Play) folgen
            board.innerHTML = sortedTeams.map(t => `
                <div class="flip-container bg-gray-800 p-4 rounded flex justify-between">
                    <span>${t.name}</span>
                    <span class="song-data blur-sensitive">${t.songs.join(', ')}</span>
                    <span class="font-bold">${t.score} Pkt</span>
                </div>
            `).join('');
            
            renderPrivacy();
        }

        // --- KI Import Dropzone ---
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => e.preventDefault());
        dropzone.addEventListener('drop', async (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const key = document.getElementById('gemini-key').value;
            if(!key) return alert("API Key fehlt!");
            
            // Mock für Gemini API Call
            console.log("Sende Datei an Gemini...", file.name);
            // Hier würde der fetch() zum Google Generative Language API Endpoint folgen
        });

        // ntfy.sh Subscriber (Echtzeit-Timer/Event Empfang)
        const eventSource = new EventSource('https://ntfy.sh/greenboys_scoreboard/sse');
        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.timer) document.getElementById('timer').innerText = data.timer;
        };

    </script>
</body>
</html>
